name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # ✅ allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for Workload Identity Federation
      contents: read    # Required for actions/checkout

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/599785405196/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-sa@devops-learning-501612.iam.gserviceaccount.com"

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-south2-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t asia-south2-docker.pkg.dev/devops-learning-501612/myrepo/myapp:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push asia-south2-docker.pkg.dev/devops-learning-501612/myrepo/myapp:${{ github.sha }}

