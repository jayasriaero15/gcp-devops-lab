name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:   # ✅ allows manual trigger from Actions tab

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/599785405196/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@devops-learning-501612.iam.gserviceaccount.com

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
            -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dev-docker-repo/mani-nginx:${{ github.sha }} \
            ./docker-lab

      - name: Push Docker Image
        run: |
          docker push \
            asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dev-docker-repo/mani-nginx:${{ github.sha }}

